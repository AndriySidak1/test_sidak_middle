name: CI

on:
  push:
    branches: ["main", "feature/**"]
  pull_request:
    branches: ["main"]

jobs:
  build-api:
    name: Build & test API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore dependencies
        run: dotnet restore CommentsApp.Api/CommentsApp.Api.csproj

      - name: Build
        run: dotnet build CommentsApp.Api/CommentsApp.Api.csproj --no-restore -c Release

  build-docker:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: build-api
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: ./CommentsApp.Api
          push: false
          tags: comments-app-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Web image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: comments-app-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
